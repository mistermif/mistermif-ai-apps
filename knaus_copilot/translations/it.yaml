configuration:
  ai_provider:
    name: Provider AI
    description: Locale, OpenAI, Groq oppure Gemini con Google Search.
  ai_api_key:
    name: Chiave API del provider
    description: Chiave privata del provider selezionato. Non viene salvata nella repository.
  ai_base_url:
    name: Indirizzo API compatibile
    description: Lascia vuoto per usare l'indirizzo predefinito del provider.
  openai_api_key:
    name: "Chiave OpenAI precedente"
    description: "Campo mantenuto soltanto per migrare installazioni esistenti."
  model:
    name: "Modello AI"
    description: "Modello usato per generare le risposte."
  autonomy_mode:
    name: "Modalità di autonomia"
    description: "Osservazione, conferma manuale o controllo limitato."
  climate_entity:
    name: "Entità climatizzatore autorizzata"
    description: "Unico apparato controllabile in questa versione."
  workspace_enabled:
    name: "Workspace isolato"
    description: "Consente di creare file soltanto in /config/mistermif_ai."
  max_context_entities:
    name: "Numero massimo di entità"
    description: "Limite delle entità Home Assistant incluse nel contesto."
  log_level:
    name: "Livello dei log"
    description: "Quantità di dettagli scritti nei log dell'app."
  privacy_mode:
    name: "Privacy cloud"
    description: "Locale, dati redatti oppure contesto esteso con posizione."
  cloud_daily_limit:
    name: "Limite cloud giornaliero"
    description: "Tetto complessivo locale. Il profilo gratuito consigliato usa 15 richieste."
  cloud_automatic_limit:
    name: "Limite ricerche automatiche"
    description: "Budget automatico separato. Il profilo gratuito consigliato usa 5 richieste."
  gemini_search_enabled:
    name: "Google Search per Gemini"
    description: "Richiede un piano Gemini che supporti Google Search Grounding; non è incluso nel Free Tier di Gemini 3.5 Flash."
