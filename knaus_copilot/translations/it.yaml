configuration:
  ai_provider:
    name: Provider AI
    description: Locale, OpenAI, Groq oppure Gemini con Google Search.
  ai_api_key:
    name: Chiave API del provider
    description: Chiave privata del provider selezionato. Non viene salvata nella repository.
  ai_base_url:
    name: Indirizzo API compatibile
    description: Lascia vuoto per usare l'indirizzo predefinito del provider.
  openai_api_key:
    name: "Chiave OpenAI precedente"
    description: "Campo mantenuto soltanto per migrare installazioni esistenti."
  model:
    name: "Modello AI"
    description: "Modello usato per generare le risposte."
  autonomy_mode:
    name: "Modalità di autonomia"
    description: "Osservazione, conferma manuale o controllo limitato."
  climate_entity:
    name: "Entità climatizzatore autorizzata"
    description: "Unico apparato controllabile in questa versione."
  workspace_enabled:
    name: "Workspace isolato"
    description: "Consente di creare file soltanto in /config/mistermif_ai."
  max_context_entities:
    name: "Numero massimo di entità"
    description: "Limite delle entità Home Assistant incluse nel contesto."
  log_level:
    name: "Livello dei log"
    description: "Quantità di dettagli scritti nei log dell'app."
  privacy_mode:
    name: "Privacy cloud"
    description: "Locale, dati redatti oppure contesto esteso con posizione."
  cloud_daily_limit:
    name: "Limite cloud giornaliero"
    description: "Tetto complessivo locale. Il profilo gratuito consigliato usa 15 richieste."
  cloud_automatic_limit:
    name: "Limite ricerche automatiche"
    description: "Budget automatico separato. Il profilo gratuito consigliato usa 5 richieste."
  gemini_search_enabled:
    name: "Google Search per Gemini"
    description: "Richiede un piano Gemini che supporti Google Search Grounding; non è incluso nel Free Tier di Gemini 3.5 Flash."
  weather_monitor_enabled:
    name: "Sorveglianza meteo autonoma"
    description: "Analizza localmente sensori e fonti meteo senza usare token AI."
  weather_interval_minutes:
    name: "Intervallo meteo in minuti"
    description: "Il valore consigliato è 30 minuti."
  dpc_radar_enabled:
    name: "Radar Protezione Civile"
    description: "Usa in Italia i dati ufficiali Radar-DPC, inclusa la probabilità di grandine."
  windy_api_key:
    name: "Chiave Windy Professional"
    description: "Opzionale. Non usare la chiave gratuita di test per decisioni reali."
  telegram_targets:
    name: "Destinatari Telegram"
    description: "ID chat separati da virgola per urgenze ed emergenze."
  weather_ai_enabled:
    name: "Valutazione meteo Gemini"
    description: "Consulta Gemini solo se il controllo locale rileva peggioramento o rischio."
  weather_ai_daily_limit:
    name: "Limite Gemini meteo giornaliero"
    description: "Massimo 10 valutazioni automatiche al giorno; con cielo sereno non effettua chiamate."
  travel_tracker_enabled:
    name: "Diario viaggi automatico"
    description: "Rileva partenza, soste e arrivo tramite GPS locale."
  travel_poll_seconds:
    name: "Campionamento GPS in secondi"
    description: "Intervallo di lettura del movimento; consigliato 30 secondi."
  travel_arrival_minutes:
    name: "Tempo per riconoscere l'arrivo"
    description: "Minuti di sosta continua prima di chiudere automaticamente il viaggio."
