configuration:
  openai_api_key:
    name: "Chiave OpenAI API"
    description: "Chiave usata dall'app per la chat AI. Non viene salvata nel repository."
  model:
    name: "Modello OpenAI"
    description: "Modello usato per generare le risposte."
  autonomy_mode:
    name: "Modalità di autonomia"
    description: "Osservazione, conferma manuale o controllo limitato."
  climate_entity:
