configuration:
  ai_provider:
    name: AI provider
    description: Local, OpenAI, Groq, or Gemini with Google Search.
  ai_api_key:
    name: Provider API key
    description: Private key for the selected provider. It is never stored in the repository.
  ai_base_url:
    name: Compatible API URL
    description: Leave empty to use the provider default.
  openai_api_key:
    name: "Previous OpenAI API key"
    description: "Kept only to migrate existing installations."
  model:
    name: "AI model"
    description: "Model used to generate responses."
  autonomy_mode:
    name: "Autonomy mode"
    description: "Observation, manual confirmation, or limited control."
  climate_entity:
    name: "Authorized climate entity"
    description: "The only controllable appliance in this version."
  workspace_enabled:
    name: "Isolated workspace"
    description: "Allows file creation only inside /config/mistermif_ai."
  max_context_entities:
    name: "Maximum entities"
    description: "Maximum Home Assistant entities included in context."
  log_level:
    name: "Log level"
    description: "Amount of detail written to the app logs."
  privacy_mode:
    name: "Cloud privacy"
    description: "Local only, redacted data, or extended context with location."
  cloud_daily_limit:
    name: "Daily cloud limit"
    description: "Overall cap kept below the configured free-tier allowance."
  cloud_automatic_limit:
    name: "Automatic search limit"
    description: "Budget reserved for searches started autonomously."
  gemini_search_enabled:
    name: "Google Search for Gemini"
    description: "Allows current searches with cited sources when needed."
