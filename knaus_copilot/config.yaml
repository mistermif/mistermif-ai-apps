name: "mistermif AI"
version: "1.2.0"
slug: "knaus_copilot"
description: "Assistente AI personale per supervisione, memoria e diario della caravan."
url: "https://github.com/mistermif/mistermif-ai-apps"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
ports:
  8100/tcp: 8100
ports_description:
  8100/tcp: "Ponte privato di laboratorio/MCP (richiede token)"
panel_icon: "mdi:caravan"
panel_title: "mistermif AI"
homeassistant_api: true
auth_api: true
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
options:
  ai_provider: "local"
  model: "local-rules"
  autonomy_mode: "observe"
  climate_entity: "climate.thermal_control"
  notification_service: "notify.notify"
  privacy_mode: "local_only"
  workspace_enabled: true
  codex_bridge_enabled: false
  weather_monitor_enabled: true
  weather_interval_minutes: 30
  dpc_radar_enabled: true
  windy_api_key: ""
  telegram_targets: ""
  weather_ai_enabled: true
  weather_ai_daily_limit: 10
  travel_tracker_enabled: true
  travel_poll_seconds: 30
  travel_arrival_minutes: 120
  max_context_entities: 80
  log_level: "info"
schema:
  ai_provider: "list(local|openai|groq|gemini)"
  ai_api_key: "password?"
  ai_base_url: "str?"
  openai_api_key: "password?"
  model: str
  autonomy_mode: "list(observe|confirm|limited)"
  climate_entity: "match(^climate\\.[a-z0-9_]+$)"
  notification_service: "match(^notify\\.[a-z0-9_]+$)"
  privacy_mode: "list(local_only|redacted_cloud|contextual_cloud)"
  cloud_daily_limit: "int(1,490)?"
  cloud_automatic_limit: "int(0,490)?"
  gemini_search_enabled: "bool?"
  workspace_enabled: bool
  codex_bridge_enabled: bool
  codex_bridge_token: "password?"
  weather_monitor_enabled: bool
  weather_interval_minutes: "int(15,180)"
  dpc_radar_enabled: bool
  windy_api_key: "password?"
  telegram_targets: "str?"
  weather_ai_enabled: bool
  weather_ai_daily_limit: "int(0,10)"
  travel_tracker_enabled: bool
  travel_poll_seconds: "int(15,300)"
  travel_arrival_minutes: "int(15,360)"
  max_context_entities: "int(10,200)"
  log_level: "list(debug|info|warning|error)"
