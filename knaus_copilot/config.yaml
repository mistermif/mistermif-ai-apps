name: "mistermif AI"
version: "0.4.0"
slug: "knaus_copilot"
description: "Assistente AI personale per supervisione, memoria e diario della caravan."
url: "https://github.com/mistermif/mistermif-ai-apps"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:caravan"
panel_title: "mistermif AI"
homeassistant_api: true
auth_api: true
map:
  - type: homeassistant_config
    read_only: false
    path: /homeassistant
options:
  ai_provider: "local"
  model: "local-rules"
  autonomy_mode: "observe"
  climate_entity: "climate.thermal_control"
  notification_service: "notify.notify"
  privacy_mode: "local_only"
  workspace_enabled: true
  max_context_entities: 80
  log_level: "info"
schema:
  ai_provider: "list(local|openai|groq)"
  ai_api_key: "password?"
  ai_base_url: "str?"
  openai_api_key: "password?"
  model: str
  autonomy_mode: "list(observe|confirm|limited)"
  climate_entity: "match(^climate\\.[a-z0-9_]+$)"
  notification_service: "match(^notify\\.[a-z0-9_]+$)"
  privacy_mode: "list(local_only|redacted_cloud)"
  workspace_enabled: bool
  max_context_entities: "int(10,200)"
  log_level: "list(debug|info|warning|error)"
